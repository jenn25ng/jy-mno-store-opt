<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매장 최적화 — SKT 유통혁신팀</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══ MNO SYNAPSE 토큰 (단일 소스 · 라이트/다크) ═══ */
:root {
  --font-body: 'Pretendard Variable', Pretendard, 'Apple SD Gothic Neo', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
}
:root[data-theme="light"] {
  --bg:#FAFBFD; --panel:#FFFFFF; --warm:#F1F3F7; --side:#F4F6F9;
  --line:#E2E6EF; --line-2:#CDD3E0;
  --t0:#16182B; --t1:#3C4060; --t2:#6E7499; --t3:#9AA0C0;
  --brand:#3617CE; --brand-2:#5B3FE8; --brand-soft:#E7E2FB;
  --ok:#2E9E6B; --ok-soft:#E2F3EA; --warn:#B5821B; --warn-soft:#F8EFD8;
  --alert:#D64B3F; --alert-soft:#FBE7E3;
  --kt:#3E63DD; --lgu:#0F9E8E;
  --shadow:0 1px 2px rgba(20,21,40,.05),0 10px 30px rgba(20,21,40,.07);
  --glow:0 0 0 1px color-mix(in srgb,var(--brand) 35%,transparent),0 8px 22px color-mix(in srgb,var(--brand) 18%,transparent);
}
:root[data-theme="dark"] {
  --bg:#0A0B16; --panel:#11132A; --warm:#161A38; --side:#0C0E20;
  --line:#222845; --line-2:#313863;
  --t0:#EEEFFA; --t1:#C2C6E0; --t2:#8C92B8; --t3:#5E6388;
  --brand:#7E68FF; --brand-2:#9E8CFF; --brand-soft:#231C58;
  --ok:#4FBE8C; --ok-soft:#0E2A1E; --warn:#E0A63A; --warn-soft:#2A2110;
  --alert:#F4766A; --alert-soft:#2E1714;
  --kt:#7AA0FF; --lgu:#3FD0BE;
  --shadow:0 1px 2px rgba(0,0,0,.5),0 14px 36px rgba(0,0,0,.4);
  --glow:0 0 0 1px color-mix(in srgb,var(--brand) 45%,transparent),0 8px 26px color-mix(in srgb,var(--brand) 35%,transparent);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 900px; min-height: 900px; }
body { font-family: var(--font-body); background: var(--bg); color: var(--t0);
  -webkit-font-smoothing: antialiased; transition: background .3s, color .3s; }
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

.header {
  background: var(--panel); color: var(--t0); border-bottom: 1px solid var(--line);
  padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 11px; }
.brand-mark { width: 26px; height: 26px; border-radius: 7px;
  background: linear-gradient(135deg, var(--brand), var(--brand-2)); position: relative; flex-shrink: 0; }
.brand-mark::after { content: ''; position: absolute; inset: 8px; border-radius: 50%; background: var(--panel); }
.header-title { font-size: 16px; font-weight: 700; letter-spacing: -.2px; }
.header-sub { font-size: 11px; color: var(--t2); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.badge-sample {
  background: var(--warm); border: 1px solid var(--line);
  color: var(--t2); padding: 4px 11px; border-radius: 20px; font-size: 11px;
}
.theme-toggle {
  width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--line);
  background: var(--panel); color: var(--t1); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition: .15s;
}
.theme-toggle:hover { background: var(--warm); }

.main { display: grid; grid-template-columns: 340px 1fr; height: calc(100vh - 56px); }

/* LEFT */
.left-panel { background: var(--panel); overflow-y: auto; border-right: 1px solid var(--line); display: flex; flex-direction: column; }

.kpi-strip {
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid var(--line);
}
.kpi-cell { padding: 12px 8px; text-align: center; border-right: 1px solid var(--line); cursor: pointer; transition: background 0.12s; }
.kpi-cell:last-child { border-right: none; }
.kpi-cell:hover { background: var(--warm); }
.kpi-cell.active { background: var(--brand-soft); box-shadow: inset 0 -2px 0 var(--brand); }
.kpi-num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 20px; font-weight: 700; letter-spacing: -.5px; color: var(--t1); }
.kpi-num.danger { color: var(--alert); }
.kpi-num.warn { color: var(--warn); }
.kpi-num.neutral { color: var(--t1); }
.kpi-label { font-size: 10px; color: var(--t3); margin-top: 3px; }

/* LIST CONTROLS (정렬 / 지역 필터) */
.list-controls { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.list-controls select {
  min-width: 0; font-size: 11px; padding: 6px 8px;
  border: 1px solid var(--line); border-radius: 8px; background: var(--panel);
  color: var(--t1); cursor: pointer; font-family: inherit;
}
.list-controls select:hover { border-color: var(--line-2); }
.list-controls .ctrl-sort { flex: 1 1 100%; }
.list-controls .ctrl-region { flex: 1 1 calc(33.333% - 4px); }
.list-controls select:disabled { color: var(--t3); background: var(--warm); cursor: not-allowed; }
.list-empty { padding: 20px; text-align: center; color: var(--t3); font-size: 13px; }

.store-list { padding: 8px; flex: 1; }

/* VERDICT BADGE */
.verdict {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 999px; flex-shrink: 0;
}
.verdict.urgent { background: var(--alert-soft); color: var(--alert); border: 1px solid color-mix(in srgb,var(--alert) 40%,transparent); }
.verdict.review { background: var(--warn-soft); color: var(--warn); border: 1px solid color-mix(in srgb,var(--warn) 40%,transparent); }
.verdict.watch  { background: transparent; color: var(--t2); border: 1px solid var(--line-2); }

/* STORE CARD — 좌측 컬러바 없음, 활성=테두리+글로우 */
.store-card {
  border: 1px solid var(--line); border-radius: 12px;
  padding: 11px 12px; margin-bottom: 7px; cursor: pointer;
  transition: border-color 0.12s, box-shadow 0.12s; background: var(--panel);
}
.store-card:hover { border-color: var(--line-2); }
.store-card.selected { border-color: var(--brand); box-shadow: var(--glow); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
.card-name { font-size: 13px; font-weight: 700; line-height: 1.3; color: var(--t0); }
.card-zone { font-size: 11px; color: var(--t3); margin-top: 2px; }

/* LENS PILLS */
.lens-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 7px; }
.lens-pill {
  font-size: 10px; padding: 2px 7px; border-radius: 8px;
  display: flex; align-items: center; gap: 3px;
}
.lens-pill.pass { background: var(--ok-soft); color: var(--ok); border: 1px solid color-mix(in srgb,var(--ok) 35%,transparent); }
.lens-pill.fail { background: var(--warm); color: var(--t3); border: 1px solid var(--line); }

/* METRICS */
.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
.metric { background: var(--warm); border-radius: 8px; padding: 5px 6px; text-align: center; }
.metric-val { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 12px; font-weight: 700; color: var(--t1); }
.metric-val.neg { color: var(--alert); }
.metric-val.pos { color: var(--ok); }
.metric-label { font-size: 9px; color: var(--t3); margin-top: 1px; }

/* MINI CARD */
.mini-card {
  border: 1px solid var(--line); border-radius: 10px; padding: 9px 11px;
  margin-bottom: 6px; cursor: pointer; background: var(--panel);
  display: flex; justify-content: space-between; align-items: center;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.mini-card:hover { border-color: var(--line-2); }
.mini-card.selected { border-color: var(--brand); box-shadow: var(--glow); }
.mini-name { font-size: 12px; font-weight: 600; color: var(--t0); }
.mini-sub { font-size: 10px; color: var(--t3); margin-top: 2px; }

/* RIGHT: MAP */
.right-panel { position: relative; }
#map { width: 100%; height: 100%; }

/* LENS FILTER BAR */
.lens-bar {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  z-index: 1000; display: flex; gap: 0; background: var(--panel);
  border-radius: 999px; box-shadow: var(--shadow);
  overflow: hidden; font-size: 11px; border: 1px solid var(--line);
}
.lens-btn {
  padding: 7px 16px; display: flex; align-items: center; gap: 5px;
  cursor: pointer; transition: background 0.15s; color: var(--t2);
  border-right: 1px solid var(--line);
}
.lens-btn:last-child { border-right: none; }
.lens-btn.active { background: var(--brand); color: #fff; font-weight: 700; }
.lens-btn:not(.active):hover { background: var(--warm); }
/* 분석 뷰(라디오)와 경쟁사 토글(독립) 구분선 */
.lens-sep { width: 1px; background: var(--line-2); align-self: stretch; }
/* 경쟁사 표시 토글: 켜짐=carrier 색, 꺼짐=중립 */
.lens-btn.carrier-toggle::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; display: inline-block; }
.lens-btn.carrier-toggle.kt.active  { background: var(--kt); color: #fff; font-weight: 700; }
.lens-btn.carrier-toggle.lgu.active { background: var(--lgu); color: #fff; font-weight: 700; }

/* MAP LEGEND */
.map-legend {
  position: absolute; bottom: 20px; left: 10px; z-index: 1000;
  background: var(--panel); border-radius: 12px; padding: 12px 14px;
  box-shadow: var(--shadow); font-size: 11px; min-width: 170px;
  border: 1px solid var(--line); color: var(--t1);
}
.legend-title { font-weight: 700; margin-bottom: 8px; font-size: 12px; color: var(--t0); }
.legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* DETAIL PANEL */
.detail-overlay {
  position: absolute; top: 10px; right: 10px; z-index: 1000;
  background: var(--panel); border-radius: 14px; padding: 16px;
  box-shadow: var(--shadow); width: 290px;
  display: none; border: 1px solid var(--line); color: var(--t1);
}
.detail-overlay.show { display: block; }
.detail-close { position: absolute; top: 12px; right: 14px; cursor: pointer; color: var(--t3); font-size: 16px; }
.detail-name { font-size: 14px; font-weight: 800; margin-bottom: 3px; padding-right: 20px; color: var(--t0); }
.detail-zone { font-size: 11px; color: var(--t3); margin-bottom: 12px; }

.lens-block { margin-bottom: 8px; }
.lens-check-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 8px 10px; border-radius: 8px; margin-bottom: 4px;
}
.lens-check-row.pass { background: var(--ok-soft); }
.lens-check-row.fail { background: var(--warm); }
.lens-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.lens-label { font-size: 12px; font-weight: 700; margin-bottom: 2px; color: var(--t0); }
.lens-desc { font-size: 11px; color: var(--t2); line-height: 1.4; }

.huff-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 6px; }
.huff-table td { padding: 4px 0; border-bottom: 1px solid var(--line); }
.huff-table tr:last-child td { border-bottom: none; }

.notice {
  margin-top: 10px; padding: 8px 10px; background: var(--warm);
  border-radius: 8px; font-size: 10px; color: var(--t2);
  border: 1px solid var(--line); line-height: 1.5;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="brand-mark"></span>
    <div>
      <div class="header-title">매장 최적화</div>
      <div class="header-sub">SKT 유통혁신팀 · 수익성 · M/S 방어 · 커버리지 3가지 기준으로 판단</div>
    </div>
  </div>
  <div class="header-right">
    <div class="badge-sample">위치 실제 데이터 · 성능 시뮬레이션</div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="라이트/다크" aria-label="테마 전환">🌙</button>
  </div>
</div>

<div class="main">
  <div class="left-panel">
    <div class="kpi-strip" id="kpiStrip"></div>
    <div class="list-controls">
      <select class="ctrl-sort" id="sortSelect" onchange="setSort(this.value)" title="정렬 기준">
        <option value="profit_asc">월손익 — 적자 큰 순</option>
        <option value="subs_desc">월순증 — 많은 순</option>
        <option value="subs_asc">월순증 — 적은 순</option>
        <option value="risk_desc">위험신호 — 렌즈 많은 순</option>
        <option value="name_asc">매장명 — 가나다순</option>
        <option value="zone_asc">상권 — 가나다순</option>
      </select>
      <select class="ctrl-region" id="sidoSelect" onchange="setSido(this.value)" title="시/도"></select>
      <select class="ctrl-region" id="guSelect" onchange="setGu(this.value)" title="구/군" disabled></select>
      <select class="ctrl-region" id="dongSelect" onchange="setDong(this.value)" title="동/읍/면" disabled></select>
    </div>
    <div id="storeList" class="store-list"></div>
  </div>

  <div class="right-panel">
    <div id="map"></div>

    <div class="lens-bar">
      <div class="lens-btn active" id="lbAll" onclick="setMapView('all')">전체 보기</div>
      <div class="lens-btn" id="lbProfit" onclick="setMapView('profit')">수익성 미달</div>
      <div class="lens-btn" id="lbMs" onclick="setMapView('ms')">M/S 방어 가능</div>
      <div class="lens-btn" id="lbCoverage" onclick="setMapView('coverage')">커버리지 여유</div>
      <span class="lens-sep"></span>
      <div class="lens-btn carrier-toggle kt active" id="tgKT" onclick="toggleCarrier('KT')">KT</div>
      <div class="lens-btn carrier-toggle lgu active" id="tgLGU" onclick="toggleCarrier('LGU')">LG U+</div>
    </div>

    <div class="map-legend" id="mapLegend"></div>
    <div class="detail-overlay" id="detailPanel">
      <span class="detail-close" onclick="closeDetail()">✕</span>
      <div id="detailContent"></div>
    </div>
  </div>
</div>

<script>
let DATA = null, map = null, tileLayer = null;
let markers = [], clusterCircles = [];

// ─── 테마(라이트/다크) ───────────────────────────────────────────────
const TILE = {
  light: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  dark:  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
};
function isDark() { return document.documentElement.getAttribute('data-theme') === 'dark'; }
function cssvar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
// 마커·범례 색은 토큰에서 읽어 테마에 자동 연동
function palette() {
  return {
    alert: cssvar('--alert'), warn: cssvar('--warn'), brand: cssvar('--brand'),
    kt: cssvar('--kt'), lgu: cssvar('--lgu'),
    muted: cssvar('--line-2'), cluster: cssvar('--line-2'), stroke: cssvar('--panel'),
  };
}
function setTiles() {
  const url = isDark() ? TILE.dark : TILE.light;
  if (tileLayer) map.removeLayer(tileLayer);
  tileLayer = L.tileLayer(url, { attribution: '© OpenStreetMap © CartoDB', maxZoom: 18 }).addTo(map);
  tileLayer.bringToBack();
}
function toggleTheme() {
  const html = document.documentElement;
  html.setAttribute('data-theme', isDark() ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = isDark() ? '☀️' : '🌙';
  setTiles();
  if (DATA) { renderMap(); renderLegend(); }
}
let currentTab = 'urgent', currentMapView = 'all';
let showKT = true, showLGU = true;   // 경쟁사 마커 표시 토글
let selectedStoreId = null;
let currentSort = 'profit_asc';
let currentSido = '', currentGu = '', currentDong = '';
let candById = {}, storeById = {};

// 동일 store_id 완전중복 제거 (LGU 원천데이터에 348건 중복 존재) — 선택 시 find() 오선택 방지
function dedupeStores(stores) {
  const seen = new Set();
  return stores.filter(s => {
    if (seen.has(s.store_id)) return false;
    seen.add(s.store_id);
    return true;
  });
}

async function init() {
  map = L.map('map', { zoomControl: true }).setView([37.5665, 126.9780], 11);
  setTiles();

  try {
    // no-cache: 서버에 항상 재검증 요청 → 데이터 갱신 시 옛 캐시로 인한 불일치(예: verdict 라벨 변경) 방지
    DATA = await fetch('simulation_results.json', { cache: 'no-cache' }).then(r => r.json());
    DATA.all_stores = dedupeStores(DATA.all_stores);
    candById = Object.fromEntries(DATA.closure_candidates.map(c => [c.store_id, c]));
    storeById = Object.fromEntries(DATA.all_stores.map(s => [s.store_id, s]));
    buildRegionFilters();
    renderKPIs();
    renderStoreList();
    renderMap();
    renderLegend();
  } catch(e) {
    document.getElementById('storeList').innerHTML =
      '<div style="padding:20px;color:var(--alert);font-size:13px;">simulation_results.json 로드 실패<br>python3 simulation.py 먼저 실행하세요</div>';
  }
}

function renderKPIs() {
  const s = DATA.summary;
  const vc = s.verdict_counts || {};
  const cells = [
    { tab: 'all',     num: s.total_skt,             cls: 'neutral', label: '전체 매장' },
    { tab: 'urgent',  num: vc['정리 유력'] || 0,    cls: 'danger',  label: '정리 유력' },
    { tab: 'review',  num: vc['조건부 검토'] || 0,  cls: 'warn',    label: '조건부 검토' },
    { tab: 'observe', num: vc['관찰'] || 0,         cls: 'neutral', label: '관찰' },
  ];
  document.getElementById('kpiStrip').innerHTML = cells.map(c => `
    <div class="kpi-cell${currentTab === c.tab ? ' active' : ''}" onclick="switchTab('${c.tab}')">
      <div class="kpi-num ${c.cls}">${c.num}</div>
      <div class="kpi-label">${c.label}</div>
    </div>
  `).join('');
}

function switchTab(tab) {
  currentTab = tab;
  renderKPIs();        // KPI 셀 활성 표시 갱신
  renderStoreList();
}

function setSort(value) {
  currentSort = value;
  renderStoreList();
}

// 주소(예: "경기 고양시 덕양구 향동동 12")에서 시/도·구·동을 파싱. 경쟁사는 주소가 없어 SKT만 대상.
function sidoOf(s) { return (s && s.address ? s.address : '').split(' ')[0] || ''; }
function guOf(s)   { return (s && s.address ? s.address : '').split(' ')[1] || ''; }
// 동/읍/면/가/리: 주소 토큰 수가 가변(3~5토큰)이라 위치가 아닌 접미사로 판정.
// 번지(숫자)·시도(0번)를 제외하고 끝에서부터 행정동 토큰을 찾음. (구/군/시는 매칭 안 됨)
function dongOf(s) {
  const t = (s && s.address ? s.address : '').split(/\s+/).filter(Boolean);
  for (let i = t.length - 1; i >= 1; i--) {
    if (/[동읍면가리]$/.test(t[i])) return t[i];
  }
  return '';
}

function buildRegionFilters() {
  const sidos = [...new Set(
    DATA.all_stores.filter(s => s.carrier === 'SKT').map(sidoOf).filter(Boolean)
  )].sort((a, b) => a.localeCompare(b, 'ko'));
  document.getElementById('sidoSelect').innerHTML =
    '<option value="">전체 시/도</option>' +
    sidos.map(s => `<option value="${s}">${s}</option>`).join('');
  updateGuOptions();
  updateDongOptions();
}

function updateGuOptions() {
  const sel = document.getElementById('guSelect');
  if (!currentSido) {
    sel.innerHTML = '<option value="">구/군 전체</option>';
    sel.disabled = true;
    return;
  }
  sel.disabled = false;
  const gus = [...new Set(
    DATA.all_stores.filter(s => s.carrier === 'SKT' && sidoOf(s) === currentSido).map(guOf).filter(Boolean)
  )].sort((a, b) => a.localeCompare(b, 'ko'));
  sel.innerHTML = '<option value="">구/군 전체</option>' +
    gus.map(g => `<option value="${g}">${g}</option>`).join('');
}

// 동 옵션 = 선택된 시/도(+구가 선택됐으면 그 구)에 속한 매장들의 동 목록. 시/도 선택 시 활성화.
function updateDongOptions() {
  const sel = document.getElementById('dongSelect');
  if (!currentSido) {
    sel.innerHTML = '<option value="">동/읍/면 전체</option>';
    sel.disabled = true;
    return;
  }
  sel.disabled = false;
  const dongs = [...new Set(
    DATA.all_stores.filter(s =>
      s.carrier === 'SKT' &&
      sidoOf(s) === currentSido &&
      (!currentGu || guOf(s) === currentGu)
    ).map(dongOf).filter(Boolean)
  )].sort((a, b) => a.localeCompare(b, 'ko'));
  sel.innerHTML = '<option value="">동/읍/면 전체</option>' +
    dongs.map(d => `<option value="${d}">${d}</option>`).join('');
}

function setSido(value) {
  currentSido = value;
  currentGu = '';
  currentDong = '';
  updateGuOptions();
  updateDongOptions();
  renderStoreList();
}

function setGu(value) {
  currentGu = value;
  currentDong = '';
  updateDongOptions();
  renderStoreList();
}

function setDong(value) {
  currentDong = value;
  renderStoreList();
}

// 후보 리스트는 address 필드가 없어 storeById로 원본 매장을 찾아 지역 판정.
function inRegion(item) {
  if (!currentSido) return true;
  const full = storeById[item.store_id] || item;
  if (sidoOf(full) !== currentSido) return false;
  if (currentGu && guOf(full) !== currentGu) return false;
  if (currentDong && dongOf(full) !== currentDong) return false;
  return true;
}

// 위험신호 점수 = 충족한 렌즈 개수(0~3). 후보가 아닌 매장은 -1로 맨 아래 정렬.
function riskScore(it) {
  if (it.lens_passed != null) return it.lens_passed;
  const c = candById[it.store_id];
  return c ? c.lens_passed : -1;
}

function sortItems(items) {
  const arr = [...items];
  const num = x => (x == null ? 0 : x);
  const ko = (a, b) => (a || '').localeCompare(b || '', 'ko');
  switch (currentSort) {
    case 'profit_asc': arr.sort((a, b) => num(a.monthly_profit_krw) - num(b.monthly_profit_krw)); break;
    case 'subs_desc':  arr.sort((a, b) => num(b.monthly_subs) - num(a.monthly_subs)); break;
    case 'subs_asc':   arr.sort((a, b) => num(a.monthly_subs) - num(b.monthly_subs)); break;
    case 'risk_desc':  arr.sort((a, b) => riskScore(b) - riskScore(a)); break;
    case 'name_asc':   arr.sort((a, b) => ko(a.store_name, b.store_name)); break;
    case 'zone_asc':   arr.sort((a, b) => ko(a.zone, b.zone)); break;
  }
  return arr;
}

function renderStoreList() {
  const list = document.getElementById('storeList');
  let items, isAll = false;

  if (currentTab === 'urgent') {
    items = DATA.closure_candidates.filter(c => c.verdict === '정리 유력');
  } else if (currentTab === 'review') {
    items = DATA.closure_candidates.filter(c => c.verdict === '조건부 검토');
  } else if (currentTab === 'observe') {
    items = DATA.closure_candidates.filter(c => c.verdict === '관찰');
  } else {
    items = DATA.all_stores.filter(s => s.carrier === 'SKT');
    isAll = true;
  }

  items = items.filter(inRegion);
  items = sortItems(items);

  if (!items.length) {
    list.innerHTML = '<div class="list-empty">해당 매장 없음</div>';
    return;
  }
  list.innerHTML = items.map(it => isAll ? miniCard(it) : candidateCard(it)).join('');
}

function verdictBadge(verdict) {
  if (verdict === '정리 유력')   return `<span class="verdict urgent">정리 유력</span>`;
  if (verdict === '조건부 검토') return `<span class="verdict review">조건부 검토</span>`;
  if (verdict === '관찰')        return `<span class="verdict watch">관찰</span>`;
  return '';
}

function lensPills(c) {
  return `
    <div class="lens-row">
      <span class="lens-pill ${c.lens_profitability ? 'pass' : 'fail'}">${c.lens_profitability ? '✓' : '–'} 수익성 미달</span>
      <span class="lens-pill ${c.lens_ms_defense   ? 'pass' : 'fail'}">${c.lens_ms_defense   ? '✓' : '–'} M/S 방어 가능</span>
      <span class="lens-pill ${c.lens_coverage     ? 'pass' : 'fail'}">${c.lens_coverage     ? '✓' : '–'} 커버리지 여유</span>
    </div>
  `;
}

function candidateCard(c) {
  const profit = c.monthly_profit_krw;
  const profitStr = profit < 0
    ? `<span class="metric-val neg">-${Math.abs(profit/10000).toFixed(0)}만</span>`
    : `<span class="metric-val pos">+${(profit/10000).toFixed(0)}만</span>`;

  return `
    <div class="store-card${selectedStoreId === c.store_id ? ' selected' : ''}"
         onclick="selectStore('${c.store_id}')">
      <div class="card-top">
        <div>
          <div class="card-name">${c.store_name}</div>
          <div class="card-zone">${c.zone}</div>
        </div>
        ${verdictBadge(c.verdict)}
      </div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-val">${c.monthly_subs ?? '-'}</div>
          <div class="metric-label">월순증(건)</div>
        </div>
        <div class="metric">
          ${profitStr}
          <div class="metric-label">월손익</div>
        </div>
        <div class="metric">
          <div class="metric-val">${c.nearby_skt_count ?? '-'}</div>
          <div class="metric-label">인근 SKT</div>
        </div>
      </div>
      ${lensPills(c)}
    </div>
  `;
}

function miniCard(s) {
  const cand = DATA.closure_candidates.find(c => c.store_id === s.store_id);
  return `
    <div class="mini-card${selectedStoreId === s.store_id ? ' selected' : ''}"
         onclick="selectStore('${s.store_id}')">
      <div>
        <div class="mini-name">${s.store_name}</div>
        <div class="mini-sub">${s.zone}${s.monthly_subs ? ` · 월순증 ${s.monthly_subs}건` : ''}</div>
      </div>
      ${cand ? verdictBadge(cand.verdict) : ''}
    </div>
  `;
}

function setMapView(view) {
  currentMapView = view;
  document.querySelectorAll('.lens-btn').forEach(b => b.classList.remove('active'));
  document.getElementById({all:'lbAll',profit:'lbProfit',ms:'lbMs',coverage:'lbCoverage'}[view]).classList.add('active');
  renderMap();
  renderLegend();
}

// 경쟁사(KT/LGU) 마커 표시 on/off — 분석 뷰와 독립적인 토글
function toggleCarrier(carrier) {
  if (carrier === 'KT') {
    showKT = !showKT;
    document.getElementById('tgKT').classList.toggle('active', showKT);
  } else {
    showLGU = !showLGU;
    document.getElementById('tgLGU').classList.toggle('active', showLGU);
  }
  renderMap();
}

function renderMap() {
  markers.forEach(m => map.removeLayer(m));
  clusterCircles.forEach(c => map.removeLayer(c));
  markers = []; clusterCircles = [];

  const urgentIds = new Set(DATA.closure_candidates.filter(c => c.verdict === '정리 유력').map(c => c.store_id));
  const reviewIds = new Set(DATA.closure_candidates.filter(c => c.verdict === '조건부 검토').map(c => c.store_id));
  const candMap   = Object.fromEntries(DATA.closure_candidates.map(c => [c.store_id, c]));

  // 경쟁사(KT/LGU)를 먼저, SKT를 나중에 그려 SKT 마커가 항상 맨 위에 오도록 함
  // (겹치는 위치에서 SKT 매장 클릭이 경쟁사 마커에 가로채이는 간헐적 선택 실패 방지)
  const renderOrder = [...DATA.all_stores].sort(
    (a, b) => (a.carrier === 'SKT' ? 1 : 0) - (b.carrier === 'SKT' ? 1 : 0)
  );

  const P = palette();
  renderOrder.forEach(store => {
    // 경쟁사 토글이 꺼져 있으면 해당 마커는 그리지 않음
    if (store.carrier === 'KT'  && !showKT)  { store._marker = null; return; }
    if (store.carrier === 'LGU' && !showLGU) { store._marker = null; return; }

    let color = P.muted, radius = 5, opacity = 0.5, weight = 1, stroke = null;

    if (store.carrier === 'KT')  { color = P.kt; }
    else if (store.carrier === 'LGU') { color = P.lgu; }
    else {
      const cand = candMap[store.store_id];
      if (currentMapView === 'all') {
        if (urgentIds.has(store.store_id))      { color = P.alert; radius = 9; opacity = 1; stroke = P.stroke; weight = 2; }
        else if (reviewIds.has(store.store_id)) { color = P.warn; radius = 7; opacity = 0.9; }
        else                                    { color = P.alert; radius = 5; opacity = 0.4; }
      } else if (currentMapView === 'profit') {
        color = cand?.lens_profitability ? P.alert : P.muted;
        radius = cand?.lens_profitability ? 7 : 5;
        opacity = cand?.lens_profitability ? 0.9 : 0.3;
      } else if (currentMapView === 'ms') {
        color = cand?.lens_ms_defense ? P.brand : P.muted;
        radius = cand?.lens_ms_defense ? 7 : 5;
        opacity = cand?.lens_ms_defense ? 0.9 : 0.3;
      } else if (currentMapView === 'coverage') {
        color = cand?.lens_coverage ? P.lgu : P.muted;
        radius = cand?.lens_coverage ? 7 : 5;
        opacity = cand?.lens_coverage ? 0.9 : 0.3;
      }
    }

    const m = L.circleMarker([store.lat, store.lng], {
      radius, fillColor: color, color: stroke || color,
      weight, fillOpacity: opacity,
    }).addTo(map);

    m.on('click', () => selectStore(store.store_id));
    m.bindTooltip(
      `<b>${store.store_name}</b>${store.monthly_subs ? `<br>월순증 ${store.monthly_subs}건` : ''}`,
      { permanent: false, direction: 'top' }
    );
    markers.push(m);
    store._marker = m;
  });

  // 밀집 상권 원
  if (currentMapView === 'all' || currentMapView === 'coverage') {
    const skt = DATA.all_stores.filter(s => s.carrier === 'SKT');
    const byCluster = {};
    skt.forEach(s => {
      if ((s.dbscan_cluster_size || 0) >= 3) {
        const k = s.dbscan_cluster;
        if (!byCluster[k]) byCluster[k] = [];
        byCluster[k].push(s);
      }
    });
    Object.values(byCluster).forEach(stores => {
      const avgLat = stores.reduce((a, s) => a + s.lat, 0) / stores.length;
      const avgLng = stores.reduce((a, s) => a + s.lng, 0) / stores.length;
      const c = L.circle([avgLat, avgLng], {
        radius: 800, color: P.cluster, fillColor: P.cluster,
        fillOpacity: 0.05, weight: 1, dashArray: '4,4',
        interactive: false  // 장식용 상권 표시 — 클릭을 흡수하지 않고 아래 매장 마커로 통과시킴
      }).addTo(map);
      clusterCircles.push(c);
    });
  }
}

function renderLegend() {
  const P = palette();
  const legends = {
    all: `
      <div class="legend-title">판정 결과</div>
      <div class="legend-row"><div class="legend-dot" style="background:${P.alert};width:13px;height:13px;border:2px solid ${P.stroke};box-shadow:0 0 0 1px ${P.alert}"></div> 정리 유력</div>
      <div class="legend-row"><div class="legend-dot" style="background:${P.warn}"></div> 조건부 검토</div>
      <div class="legend-row"><div class="legend-dot" style="background:${P.alert};opacity:0.4"></div> 일반 SKT 매장</div>
      <div class="legend-row"><div class="legend-dot" style="background:${P.kt}"></div> KT</div>
      <div class="legend-row"><div class="legend-dot" style="background:${P.lgu}"></div> LGU+</div>
      <div style="font-size:9px;color:var(--t3);margin-top:6px;">점선 원 = 밀집 상권 (800m)</div>
    `,
    profit: `
      <div class="legend-title">수익성 미달 기준</div>
      <div class="legend-row"><div class="legend-dot" style="background:${P.alert}"></div> 적자 + 이탈 패턴</div>
      <div class="legend-row"><div class="legend-dot" style="background:${P.muted}"></div> 해당 없음</div>
    `,
    ms: `
      <div class="legend-title">M/S 방어 가능</div>
      <div class="legend-row"><div class="legend-dot" style="background:${P.brand}"></div> 인근 SKT가 충분히 흡수</div>
      <div class="legend-row"><div class="legend-dot" style="background:${P.muted}"></div> 흡수 불충분</div>
    `,
    coverage: `
      <div class="legend-title">커버리지 여유</div>
      <div class="legend-row"><div class="legend-dot" style="background:${P.lgu}"></div> 반경 내 대체 매장 충분</div>
      <div class="legend-row"><div class="legend-dot" style="background:${P.muted}"></div> 단독 입지</div>
    `,
  };
  document.getElementById('mapLegend').innerHTML = legends[currentMapView];
}

function selectStore(storeId) {
  selectedStoreId = storeId;
  renderStoreList();
  const store = DATA.all_stores.find(s => s.store_id === storeId);
  // 선택·상세표시를 먼저 확정 — 지도 이동(flyTo)이 실패해도 선택이 깨지지 않도록 분리
  showDetail(store);
  if (store) {
    if (store._marker) store._marker.bringToFront();
    if (Number.isFinite(store.lat) && Number.isFinite(store.lng)) {
      try { map.flyTo([store.lat, store.lng], 14, { duration: 0.7 }); } catch (e) { /* 지도 이동 실패는 선택과 무관 */ }
    }
  }
}

function showDetail(store) {
  if (!store) return;
  const panel   = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');
  const cand    = DATA.closure_candidates.find(c => c.store_id === store.store_id);

  const profit = store.monthly_profit_krw;
  const profitStr = profit != null
    ? (profit < 0
        ? `적자 <b style="color:var(--alert)">월 ${Math.abs(profit/10000).toFixed(0)}만원 손실</b>`
        : `흑자 <b style="color:var(--ok)">월 ${(profit/10000).toFixed(0)}만원</b>`)
    : '데이터 없음';

  const lensHtml = cand ? `
    <div style="font-size:11px;font-weight:700;color:var(--t3);margin-bottom:6px;">3가지 기준 판정</div>
    <div class="lens-check-row ${cand.lens_profitability ? 'pass' : 'fail'}">
      <div class="lens-icon">${cand.lens_profitability ? '✅' : '⬜'}</div>
      <div>
        <div class="lens-label">수익성 미달</div>
        <div class="lens-desc">${profitStr}${store.monthly_subs ? ` · 월순증 ${store.monthly_subs}건` : ''}</div>
      </div>
    </div>
    <div class="lens-check-row ${cand.lens_ms_defense ? 'pass' : 'fail'}">
      <div class="lens-icon">${cand.lens_ms_defense ? '✅' : '⬜'}</div>
      <div>
        <div class="lens-label">M/S 방어 가능</div>
        <div class="lens-desc">인근 SKT 매장 ${cand.nearby_skt_count}개 · 흡수율 ${cand.huff_absorption_rate != null ? (cand.huff_absorption_rate*100).toFixed(0)+'%' : '-'}</div>
      </div>
    </div>
    <div class="lens-check-row ${cand.lens_coverage ? 'pass' : 'fail'}">
      <div class="lens-icon">${cand.lens_coverage ? '✅' : '⬜'}</div>
      <div>
        <div class="lens-label">커버리지 여유</div>
        <div class="lens-desc">같은 밀집 상권 내 SKT 매장 ${store.dbscan_cluster_size || 0}개</div>
      </div>
    </div>
  ` : '<div style="font-size:12px;color:var(--t3);padding:8px 0">3개 기준 모두 미해당 — 유지 권고</div>';

  let huffHtml = '';
  if (cand?.huff_redistribution?.length) {
    huffHtml = `
      <div style="font-size:11px;font-weight:700;color:var(--t3);margin:10px 0 6px">폐점 시 고객 이동 예상</div>
      <div style="font-size:10px;color:var(--t3);margin-bottom:6px">25% 이탈 추정 (${cand.huff_lost_subs}건) · 나머지는 아래 매장으로</div>
      <table class="huff-table">
        ${[...cand.huff_redistribution].sort((a,b) => a.distance_km - b.distance_km).map(h => `
          <tr>
            <td style="color:var(--t1)">${h.store_name}</td>
            <td style="color:var(--t3);text-align:right">${h.distance_km}km</td>
            <td style="color:var(--ok);font-weight:700;text-align:right">+${h.absorbed_subs}건</td>
          </tr>
        `).join('')}
      </table>
    `;
  }

  content.innerHTML = `
    <div class="detail-name">${store.store_name}</div>
    <div class="detail-zone">${store.zone || ''} ${store.carrier === 'SKT' ? '' : '· ' + store.carrier}</div>
    ${cand ? `<div style="margin-bottom:12px">${verdictBadge(cand.verdict)}</div>` : ''}
    ${lensHtml}
    ${huffHtml}
    <div class="notice">AI 신호는 참고 지표입니다. 최종 의사결정은 현장 검토 및 전략 판단이 필요합니다.</div>
  `;

  panel.classList.add('show');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('show');
  selectedStoreId = null;
  renderStoreList();
}

function verdictBadge(verdict) {
  if (verdict === '정리 유력')   return `<span class="verdict urgent">정리 유력</span>`;
  if (verdict === '조건부 검토') return `<span class="verdict review">조건부 검토</span>`;
  if (verdict === '관찰')        return `<span class="verdict watch">관찰</span>`;
  return '';
}

init();
</script>
</body>
</html>
